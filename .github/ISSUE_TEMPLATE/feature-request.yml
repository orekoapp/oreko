name: Feature Request
description: Suggest a new feature for Oreko
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like to see.

  - type: textarea
    id: summary
    attributes:
      label: Feature Summary
      description: A brief description of the feature.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Who would benefit?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed solution in detail.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Quotes
        - Invoices
        - Clients
        - Contracts
        - Rate Cards
        - Dashboard / Analytics
        - Payments
        - PDF / Email
        - Settings
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, mockups, or examples from other tools.
