version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: oreko-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oreko}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oreko_dev_only}
      POSTGRES_DB: ${POSTGRES_DB:-oreko}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Bug #158: Bind to localhost only to prevent network exposure
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U oreko']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for BullMQ job queues)
  redis:
    image: redis:7-alpine
    container_name: oreko-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  # Mailpit for email testing in development
  # NOTE: Dev-only — do NOT use in production. Insecure auth is enabled for local testing.
  mailpit:
    image: axllent/mailpit:latest
    container_name: oreko-mailpit
    restart: unless-stopped
    ports:
      - '8025:8025' # Web UI
      - '1025:1025' # SMTP
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1 # Dev-only: accept any SMTP credentials
      MP_SMTP_AUTH_ALLOW_INSECURE: 1 # Dev-only: allow plaintext auth

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: oreko-network
